name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  host-artifact:
    name: Host Simulator Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake git ninja-build zsh

      - name: Cache ESP-IDF
        uses: actions/cache@v4
        with:
          path: |
            .deps/esp-idf-v5.5.2
            .deps/.espressif
          key: esp-idf-v5.5.2-${{ runner.os }}-host-${{ hashFiles('firmware/dependencies.lock', 'firmware/sdkconfig.defaults', 'firmware/sdkconfig.defaults.esp32', 'firmware/sdkconfig.defaults.esp32s3') }}

      - name: Install ESP-IDF
        shell: bash
        run: |
          mkdir -p .deps
          if [ ! -d .deps/esp-idf-v5.5.2/.git ]; then
            git clone -b v5.5.2 --recursive https://github.com/espressif/esp-idf.git .deps/esp-idf-v5.5.2
          fi
          IDF_TOOLS_PATH="$PWD/.deps/.espressif" ./.deps/esp-idf-v5.5.2/install.sh esp32s3,esp32

      - name: Fetch managed components
        shell: bash
        run: |
          zsh -lc 'source scripts/use-idf.sh && cd firmware && idf.py -B build-release-bootstrap set-target esp32s3 && idf.py -B build-release-bootstrap reconfigure'

      - name: Configure
        run: cmake -S . -B build -G Ninja

      - name: Build
        run: cmake --build build

      - name: Package simulator
        run: |
          mkdir -p dist/simulator
          cp build/espclaw_simulator dist/simulator/espclaw_simulator-linux-x86_64
          (cd dist/simulator && sha256sum espclaw_simulator-linux-x86_64 > SHA256SUMS.txt)

      - name: Upload simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: simulator-artifact
          path: dist/simulator/*

  firmware:
    name: Firmware Artifact (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - esp32
          - esp32s3
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install firmware dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zsh ninja-build zip python3

      - name: Cache ESP-IDF
        uses: actions/cache@v4
        with:
          path: |
            .deps/esp-idf-v5.5.2
            .deps/.espressif
          key: esp-idf-v5.5.2-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('firmware/dependencies.lock', 'firmware/sdkconfig.defaults', 'firmware/sdkconfig.defaults.esp32', 'firmware/sdkconfig.defaults.esp32s3') }}

      - name: Install ESP-IDF
        shell: bash
        run: |
          mkdir -p .deps
          if [ ! -d .deps/esp-idf-v5.5.2/.git ]; then
            git clone -b v5.5.2 --recursive https://github.com/espressif/esp-idf.git .deps/esp-idf-v5.5.2
          fi
          IDF_TOOLS_PATH="$PWD/.deps/.espressif" ./.deps/esp-idf-v5.5.2/install.sh ${{ matrix.target }}

      - name: Build firmware
        shell: bash
        run: |
          zsh -lc 'source scripts/use-idf.sh && cd firmware && idf.py -B build-${{ matrix.target }} set-target ${{ matrix.target }} && idf.py -B build-${{ matrix.target }} build'

      - name: Package firmware
        shell: bash
        run: |
          out="dist/${{ matrix.target }}"
          build_dir="firmware/build-${{ matrix.target }}"
          mkdir -p "$out"
          cp "$build_dir/espclaw_firmware.bin" "$out/espclaw_firmware-${{ matrix.target }}.bin"
          cp "$build_dir/bootloader/bootloader.bin" "$out/bootloader-${{ matrix.target }}.bin"
          cp "$build_dir/partition_table/partition-table.bin" "$out/partition-table-${{ matrix.target }}.bin"
          if [ -f "$build_dir/ota_data_initial.bin" ]; then
            cp "$build_dir/ota_data_initial.bin" "$out/ota_data_initial-${{ matrix.target }}.bin"
          fi
          cp "$build_dir/flasher_args.json" "$out/flasher_args-${{ matrix.target }}.json"
          python3 scripts/generate_release_manifests.py \
            --repo "${{ github.repository }}" \
            --tag "${{ github.ref_name }}" \
            --target "${{ matrix.target }}" \
            --flasher-args "$out/flasher_args-${{ matrix.target }}.json" \
            --manifest-output "$out/esp-web-tools-manifest-${{ matrix.target }}.json" \
            --entry-output "$out/release-entry-${{ matrix.target }}.json"
          (
            cd "$out"
            zip -q "espclaw-${{ matrix.target }}-${{ github.ref_name }}.zip" \
              "espclaw_firmware-${{ matrix.target }}.bin" \
              "bootloader-${{ matrix.target }}.bin" \
              "partition-table-${{ matrix.target }}.bin" \
              "flasher_args-${{ matrix.target }}.json" \
              "esp-web-tools-manifest-${{ matrix.target }}.json"
            if [ -f "ota_data_initial-${{ matrix.target }}.bin" ]; then
              zip -q "espclaw-${{ matrix.target }}-${{ github.ref_name }}.zip" "ota_data_initial-${{ matrix.target }}.bin"
            fi
          )
          (cd "$out" && sha256sum * > SHA256SUMS.txt)

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: dist/${{ matrix.target }}/*

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - host-artifact
      - firmware
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/**/*
