name: Site Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Project Site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zsh ninja-build

      - name: Cache ESP-IDF
        uses: actions/cache@v4
        with:
          path: |
            .deps/esp-idf-v5.5.2
            .deps/.espressif
          key: esp-idf-v5.5.2-${{ runner.os }}-pages-${{ hashFiles('firmware/dependencies.lock', 'firmware/sdkconfig.defaults', 'firmware/sdkconfig.defaults.esp32', 'firmware/sdkconfig.defaults.esp32s3') }}

      - name: Install ESP-IDF
        shell: bash
        run: |
          mkdir -p .deps
          if [ ! -d .deps/esp-idf-v5.5.2/.git ]; then
            git clone -b v5.5.2 --recursive https://github.com/espressif/esp-idf.git .deps/esp-idf-v5.5.2
          fi
          IDF_TOOLS_PATH="$PWD/.deps/.espressif" ./.deps/esp-idf-v5.5.2/install.sh esp32s3,esp32

      - name: Fetch managed components
        shell: bash
        run: |
          zsh -lc 'source scripts/use-idf.sh && cd firmware && idf.py -B build-pages-bootstrap set-target esp32s3 && idf.py -B build-pages-bootstrap reconfigure'

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 4.0.20

      - name: Build browser runtime
        run: ./scripts/build_site_wasm.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
